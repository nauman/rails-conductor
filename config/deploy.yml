# Name of your application. Used to uniquely configure containers.
service: conductor

# Name of the container image.
image: <%= ENV["KAMAL_REGISTRY_USERNAME"] || "your-user" %>/conductor

# Deploy to these servers.
servers:
  web:
    - <%= ENV["DEPLOY_SERVER_IP"] || "YOUR_SERVER_IP" %>

# Connect to the host as a non-root deploy user (set up with key auth + sudo).
ssh:
  user: <%= ENV["DEPLOY_SSH_USER"] || "deploy" %>

# Enable SSL auto certification via Let's Encrypt.
# Set Cloudflare SSL/TLS to "Full" if using Cloudflare.
proxy:
  ssl: true
  host: <%= ENV["APP_HOST"] || "conductor.example.com" %>

# Container registry (Docker Hub by default; override via KAMAL_REGISTRY_SERVER).
registry:
  server: <%= ENV["KAMAL_REGISTRY_SERVER"] || "docker.io" %>
  username: <%= ENV["KAMAL_REGISTRY_USERNAME"] || "your-user" %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_PASSWORD
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - SES_SMTP_USERNAME
    - SES_SMTP_PASSWORD
    - SENTRY_DSN
    - CONDUCTOR_MCP_TOKEN
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    SOLID_QUEUE_IN_PUMA: true

    # Set number of cores available to the application on each server.
    WEB_CONCURRENCY: 2

    # Database connection (points at the Postgres accessory container below)
    DATABASE_HOST: <%= ENV["DATABASE_HOST"] || "conductor-postgres" %>
    DATABASE_USERNAME: <%= ENV["DATABASE_USERNAME"] || "conductor" %>
    DATABASE_NAME: conductor_production

    # Application host
    APP_HOST: <%= ENV["APP_HOST"] || "conductor.example.com" %>

    # Mailer (SES SMTP host; credentials come from secrets above)
    MAILER_FROM: <%= ENV["MAILER_FROM"] || "noreply@conductor.example.com" %>
    SES_SMTP_HOST: <%= ENV["SES_SMTP_HOST"] || "email-smtp.us-east-1.amazonaws.com" %>

    # Storage
    AWS_REGION: <%= ENV["AWS_REGION"] || "us-east-1" %>
    S3_BUCKET: <%= ENV["S3_BUCKET"] || "conductor-storage" %>

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for Active Storage files.
volumes:
  - "conductor_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# Shared Postgres on this host. This box is a multi-app server: run one cluster
# and give each app its own database/role. Container is reachable by other
# Kamal apps on the shared network as "conductor-postgres".
accessories:
  postgres:
    image: postgres:16
    host: <%= ENV["DEPLOY_SERVER_IP"] || "YOUR_SERVER_IP" %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: <%= ENV["DATABASE_USERNAME"] || "conductor" %>
        POSTGRES_DB: conductor_production
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - conductor_postgres_data:/var/lib/postgresql/data
