# PostgreSQL configuration for Conductor
#
# Install PostgreSQL:
#   brew install postgresql@16
#   brew services start postgresql@16
#
# Create databases:
#   createdb conductor_development
#   createdb conductor_test
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { ENV["USER"] } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>

development:
  primary:
    <<: *default
    database: conductor_development
  queue:
    <<: *default
    database: conductor_development_queue
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: conductor_test
  queue:
    <<: *default
    database: conductor_test_queue
    migrations_paths: db/queue_migrate

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "conductor_production") %>
    username: <%= ENV["DATABASE_USERNAME"] %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
  cache:
    <<: *default
    database: <%= ENV.fetch("CACHE_DATABASE_NAME", "conductor_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("QUEUE_DATABASE_NAME", "conductor_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("CABLE_DATABASE_NAME", "conductor_production_cable") %>
    migrations_paths: db/cable_migrate
